<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        p{
            text-align: center;
        }
    </style>
</head>

<body style="margin:0; font-family:Arial, Helvetica, sans-serif; background:#f4f6f9; display:flex; justify-content:center; align-items:center; min-height:100vh;">

    <div style="background:white; padding:40px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.1); width:400px;">

        <h2 style="text-align:center; color:#333; margin-top:0;">
            URL Shortener
        </h2>

        <form action="" method="post">
            {% csrf_token %}

            <div style="margin-bottom:20px; ">
                {{ form.as_p }}
            </div>

            <input
                type="submit"
                value="Generate Short URL"
                style="
                    width:100%;
                    padding:12px;
                    background:#4f46e5;
                    color:white;
                    border:none;
                    border-radius:8px;
                    cursor:pointer;
                    font-size:16px;
                    font-weight:bold;
                "
            >
        </form>

        {% if shorturl %}
        <div style="margin-top:25px; text-align:center; padding:15px; background:#eef4ff; border-radius:8px;">
            <p style="margin:0 0 10px 0; color:#555; font-weight:bold;">
                Your Short URL
            </p>

            <a
                href="{{ shorturl }}"
                target="_blank"
                style="
                    color:#2563eb;
                    text-decoration:none;
                    font-size:16px;
                    word-break:break-all;
                "
            >
                {{ shorturl }}
            </a>
        </div>
        {% endif %}

        {%if qr %}
        <div style=" display:flex ; justify-content: center; align-items: center;">
            {{qr|safe}}
        </div>
        {%endif%}

    </div>

</body>
</html>
